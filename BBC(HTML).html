<!DOCTYPE html>

			padding: 20px 20px 0 10px;

			text-decoration: none;
			font-size: 30px;
			position: relative;
			top:-10px;
		}
		#local-news a:hover{

		#menu-bar-2-container{

		#menu-bar-2{

			color:white;
			text-decoration: none;

			border-right: 1px #BDA478 solid;

			top:11px;

		}
